# This rule is not used by the project cad-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to operator.sundew.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cad-operator
    app.kubernetes.io/managed-by: kustomize
  name: cloudactivedefense-viewer-role
rules:
- apiGroups:
  - operator.sundew.com
  resources:
  - cloudactivedefenses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.sundew.com
  resources:
  - cloudactivedefenses/status
  verbs:
  - get
