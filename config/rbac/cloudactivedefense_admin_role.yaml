# This rule is not used by the project cad-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over operator.sundew.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cad-operator
    app.kubernetes.io/managed-by: kustomize
  name: cloudactivedefense-admin-role
rules:
- apiGroups:
  - operator.sundew.com
  resources:
  - cloudactivedefenses
  verbs:
  - '*'
- apiGroups:
  - operator.sundew.com
  resources:
  - cloudactivedefenses/status
  verbs:
  - get
